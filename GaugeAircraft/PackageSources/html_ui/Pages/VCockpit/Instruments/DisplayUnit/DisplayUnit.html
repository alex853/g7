<link rel="stylesheet" href="DisplayUnit.css"/>
<script type="text/html" id="DisplayUnit">
    <div id="Mainframe"> <!-- 1260x960 -->
        <div class="layout-two-columns dev-background" id="map-panel">
            <div class="panel-frame" id="map-header" style="height: 6.5%; opacity: 0.5;">
                <!-- 9 sections go here -->
            </div>
            <div class="text-placeholder">MAP</div>
        </div>
        <div class="layout-one-column">
            <div class="layout-one-sixth panel-frame dev-background" id="primary-engine-panel">
                <div class="absolute-positioning">
                    <svg viewBox="0 0 400 450" preserveAspectRatio="none" style="width:100%; height:100%;">
<!--                        <path d="M 100 100-->
<!--                                 L 100 20-->
<!--                                 A 80 80 0 1 1 60 170-->
<!--                                 Z" fill="#000"/>-->
                        <path d="M  74  80
                                 L 134  80
                                 L  100  90
                                 Z" fill="#f00"/>

                        <line x1=" 74" y1="55" x2=" 74" y2="350" stroke="#99f" stroke-width="0.5"/> <!-- left centers -->
                        <line x1="317" y1="55" x2="317" y2="350" stroke="#99f" stroke-width="0.5"/> <!-- right centers -->

                        <line x1="40" y1=" 80" x2="350" y2=" 80" stroke="#99f" stroke-width="0.5"/> <!-- EPR centers -->
                        <line x1="40" y1="190" x2="350" y2="190" stroke="#99f" stroke-width="0.5"/> <!-- TGT centers -->
                        <line x1="40" y1="302" x2="350" y2="302" stroke="#99f" stroke-width="0.5"/> <!-- LP centers -->
                    </svg>

                    <!-- engine N1 -->
                    <div class="centered-absolute-label gauge-label" style="top: 10%; left: 50%;">EPR</div>
                    <div class="centered-absolute-label gauge-value" style="top:  9%; left: 25%;">0.99</div>
                    <div class="centered-absolute-label gauge-value" style="top:  9%; left: 86%;">1.00</div>

                    <!-- engine TGT -->
                    <div class="centered-absolute-label gauge-label" style="top: 35%; left: 50%;">TGT</div>
                    <div class="centered-absolute-label gauge-value" style="top: 34%; left: 26%;">&nbsp;&nbsp;25</div>
                    <div class="centered-absolute-label gauge-value" style="top: 34%; left: 87%;">&nbsp;&nbsp;25</div>

                    <!-- engine LP -->
                    <div class="centered-absolute-label gauge-label" style="top: 59%; left: 50%;">LP</div>
                    <div class="centered-absolute-label gauge-value" style="top: 59%; left: 26%;">&nbsp;&nbsp;0.0</div>
                    <div class="centered-absolute-label gauge-value" style="top: 59%; left: 87%;">&nbsp;&nbsp;0.0</div>

                    <!-- engine HP -->
                    <div class="centered-absolute-label gauge-label" style="top: 84%; left: 50%;">HP</div>
                    <div class="centered-absolute-label gauge-value" style="top: 84%; left: 25%;">&nbsp;&nbsp;0.0</div>
                    <div class="centered-absolute-label gauge-value" style="top: 84%; left: 75%;">&nbsp;&nbsp;0.0</div>

                    <!-- engine FF -->
                    <div class="centered-absolute-label gauge-label" style="top: 92%; left: 50%;">FF</div>
                    <div class="centered-absolute-label gauge-value" style="top: 92%; left: 25%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-value" style="top: 92%; left: 75%;">&nbsp;&nbsp;&nbsp;0</div>
                </div>
            </div>
            <div class="layout-one-sixth panel-frame" id="secondary-engine-panel">
                <div class="absolute-positioning">
                    <svg viewBox="0 0 400 450" preserveAspectRatio="none" style="width:100%; height:100%;">
                        <defs>
                            <marker id="arrow"
                                    markerWidth="10"
                                    markerHeight="10"
                                    refX="0"
                                    refY="1.5"
                                    orient="auto"
                                    markerUnits="strokeWidth">
                                <path d="M0,0 L2.5,1.5 L0,3 z" fill="#ccc"/>
                            </marker>
                        </defs>

                        <!-- fuel balance diagram -->
                        <line x1="200" y1=" 47" x2="200" y2=" 82" stroke="#ccc" stroke-width="3"/>
                        <line x1="144" y1=" 67" x2="189" y2=" 67" stroke="#ccc" stroke-width="4" marker-end="url(#arrow)"/>
                        <line x1="256" y1=" 57" x2="211" y2=" 57" stroke="#ccc" stroke-width="4" marker-end="url(#arrow)"/>

                        <!-- separator - after fuel gauges -->
                        <line x1="8" y1="124" x2="392" y2="124" stroke="#aaa" stroke-width="2"/>

                        <!-- separator - after oil gauges -->
                        <line x1="8" y1="200" x2="392" y2="200" stroke="#aaa" stroke-width="2"/>

                        <!-- separator - after vibration gauges -->
                        <line x1="8" y1="274" x2="392" y2="274" stroke="#aaa" stroke-width="2"/>

                        <!-- separator - after hyd pressure gauges -->
                        <line x1="8" y1="362" x2="392" y2="362" stroke="#aaa" stroke-width="2"/>

                        <!-- separator - fuel tank temp gauges -->
                        <line x1="8" y1="407" x2="392" y2="407" stroke="#aaa" stroke-width="2"/>
                    </svg>

                    <!-- fuel gauges -->
                    <div class="centered-absolute-label gauge-label" style="top:  3%; left: 50%;">Fuel Qty (lb)</div>
                    <div class="centered-absolute-label gauge-value" style="top: 11%; left: 16%;">&nbsp;9900</div>
                    <div class="centered-absolute-label gauge-value" style="top: 11%; left: 84%;">11000</div>
                    <div class="centered-absolute-label gauge-value" style="top: 20%; left: 50%;">20000</div>

                    <!-- oil gauges -->
                    <div class="centered-absolute-label gauge-value" style="top: 30%; left: 21%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-label" style="top: 30%; left: 50%;">Oil Press</div>
                    <div class="centered-absolute-label gauge-value" style="top: 30%; left: 80%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-value" style="top: 37%; left: 21%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-label" style="top: 37%; left: 50%;">Oil Temp</div>
                    <div class="centered-absolute-label gauge-value" style="top: 37%; left: 80%;">&nbsp;&nbsp;&nbsp;0</div>

                    <!-- vibration gauges -->
                    <div class="centered-absolute-label gauge-value" style="top: 46%; left: 20%;"><0.30</div>
                    <div class="centered-absolute-label gauge-label" style="top: 46%; left: 50%;">LP EVM</div>
                    <div class="centered-absolute-label gauge-value" style="top: 46%; left: 81%;"><0.30</div>
                    <div class="centered-absolute-label gauge-value" style="top: 54%; left: 20%;"><0.60</div>
                    <div class="centered-absolute-label gauge-label" style="top: 54%; left: 50%;">HP EVM</div>
                    <div class="centered-absolute-label gauge-value" style="top: 54%; left: 81%;"><0.60</div>

                    <!-- hyd pressure gauges -->
                    <div class="centered-absolute-label gauge-label" style="top: 62%; left: 50%;">Hyd Press</div>
                    <div class="centered-absolute-label gauge-label" style="top: 67%; left: 15%;">Left</div>
                    <div class="centered-absolute-label gauge-label" style="top: 67%; left: 38%;">Aux</div>
                    <div class="centered-absolute-label gauge-label" style="top: 67%; left: 62%;">PTU</div>
                    <div class="centered-absolute-label gauge-label" style="top: 67%; left: 86%;">Right</div>
                    <div class="centered-absolute-label gauge-value" style="top: 73%; left: 15%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-value" style="top: 73%; left: 38%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-value" style="top: 73%; left: 62%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-value" style="top: 73%; left: 86%;">&nbsp;&nbsp;&nbsp;0</div>

                    <!-- fuel tank temp gauges -->
                    <div class="centered-absolute-label gauge-value" style="top: 83%; left: 15%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-label" style="top: 83%; left: 50%;">Fuel Tank Temp</div>
                    <div class="centered-absolute-label gauge-value" style="top: 83%; left: 86%;">&nbsp;&nbsp;&nbsp;0</div>

                    <!-- bleed air pressure gauges -->
                    <div class="centered-absolute-label gauge-value" style="top: 92%; left: 15%;">&nbsp;&nbsp;&nbsp;0</div>
                    <div class="centered-absolute-label gauge-label" style="top: 92%; left: 50%;">Bleed Air Press</div>
                    <div class="centered-absolute-label gauge-value" style="top: 92%; left: 86%;">&nbsp;&nbsp;&nbsp;0</div>
                </div>
            </div>
        </div>
    </div>
</script>
<script type="text/html" import-script="/Pages/VCockpit/Instruments/DisplayUnit/DisplayUnit.js"></script>
