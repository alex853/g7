<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>

<script src="../_dev-stubs.js"></script>

<div id="dev-root"></div>

<script>
    const pathParts = window.location.pathname.split('/');
    const folderName = pathParts[pathParts.length - 2];
    const instrumentName = folderName;

    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = `./${instrumentName}.css`;
    document.head.appendChild(link);

    fetch(`./${instrumentName}.html`)
        .then(r => r.text())
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");

            const template = doc.querySelector('script[type="text/html"]');

            if (!template) {
                console.error("Template not found");
                return;
            }

            setInstrumentTemplateHtml(template.innerHTML);
        });

</script>
<script>

    loadScript("Tools");
    loadScript("EngineGauge");
    loadScript("ULRBJ");
    loadScript("MapPanel");
    loadScript("PrimaryEnginePanel");
    loadScript("SecondaryEnginePanel");
    loadScript("CasMessagesPanel");
    loadScript("FlightPlanPanel");
    loadScript("ChartsPanel");
    loadScript(instrumentName);

    function loadScript(scriptName) {
        const script = document.createElement("script");
        script.src = `./${scriptName}.js`;
        document.body.appendChild(script);
    }

</script>

</script>
